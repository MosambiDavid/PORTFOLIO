<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | David Mosambi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* Green */
            --bg: #020617;
            --card-bg: #0f172a;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
        }

        h1 span {
            color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-card h3 {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 2rem;
            font-weight: 700;
        }

        .messages-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th,
        td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .badge {
            background: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Admin <span>Dashboard</span></h1>
        <a href="/" style="color: var(--text-dim); text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to
            Site</a>
    </header>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Messages</h3>
            <p id="totalCount">0</p>
        </div>
        <div class="stat-card">
            <h3>Recent (Today)</h3>
            <p id="todayCount">0</p>
        </div>
    </div>

    <table class="messages-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="messageList">
            <!-- Messages will be loaded here -->
        </tbody>
    </table>

    <div id="newMsgNotification" class="notification">
        <i class="fas fa-bell"></i> New message received!
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const messageList = document.getElementById('messageList');
        const totalCount = document.getElementById('totalCount');
        const todayCount = document.getElementById('todayCount');
        const notification = document.getElementById('newMsgNotification');
        const notifSound = document.getElementById('notifSound');

        // Initial fetch
        async function fetchMessages() {
            try {
                const response = await fetch('/api/messages');
                const messages = await response.json();
                renderMessages(messages);
            } catch (err) {
                console.error('Error fetching messages:', err);
            }
        }

        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                const response = await fetch(`/api/messages/${id}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    fetchMessages();
                } else {
                    alert('Failed to delete message');
                }
            } catch (err) {
                console.error('Error deleting message:', err);
            }
        }

        function renderMessages(messages) {
            messageList.innerHTML = '';
            totalCount.textContent = messages.length;

            const today = new Date().toDateString();
            let todayMsgCount = 0;

            messages.forEach(msg => {
                const date = new Date(msg.created_at);
                if (date.toDateString() === today) todayMsgCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="white-space: nowrap; color: var(--text-dim); font-size: 0.9rem;">${date.toLocaleString()}</td>
                    <td style="font-weight: 600;">${msg.name}</td>
                    <td><a href="mailto:${msg.email}" style="color: var(--primary); text-decoration: none;">${msg.email}</a></td>
                    <td style="max-width: 400px; word-wrap: break-word;">${msg.message}</td>
                    <td>
                        <button onclick="deleteMessage(${msg.id})" style="background: #f87171; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                messageList.appendChild(tr);
            });

            todayCount.textContent = todayMsgCount;
        }

        // Listen for real-time updates
        socket.on('new-message', (msg) => {
            // Show notification
            notification.style.display = 'block';
            try { notifSound.play(); } catch (e) { }

            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);

            // Re-fetch to update the table
            fetchMessages();
        });

        fetchMessages();
    </script>

</body>

</html>
